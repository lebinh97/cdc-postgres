services:
  production:
    image: postgres:16-alpine
    container_name: production
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: cdc_db
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/pg5433:/var/lib/postgresql/data
      - ./config/pg5433/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg5433/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cdc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  read_replica:
    image: postgres:16-alpine
    container_name: read_replica
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: cdc_db
    ports:
      - "5434:5432"
    volumes:
      - ./init_replica.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/pg5434:/var/lib/postgresql/data
      - ./config/pg5434/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg5434/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cdc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      production:
        condition: service_healthy

  producer:
    build: ./producer_app
    environment:
      PG_HOST: production
      PG_PORT: "5432"
    depends_on:
      production:  { condition: service_healthy }
      read_replica: { condition: service_healthy }

  monitor:
    build: ./monitoring_app
    volumes:
      - ./monitoring_app/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      production:  { condition: service_healthy }
      read_replica: { condition: service_healthy }

  # ──────────────────────────────────────────────────────────────
  # Kafka (KRaft — no Zookeeper) + Debezium → CDC → Kafka topics
  # ──────────────────────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "cdc-cluster-001"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: "cdc-cluster-001"
    volumes:
      - ./kafka/data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  debezium-connect:
    build: ./debezium
    container_name: debezium-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      production:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    volumes:
      - ./kafka/connect:/kafka/connect
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8083/connectors"]
      interval: 10s
      timeout: 10s
      retries: 5
