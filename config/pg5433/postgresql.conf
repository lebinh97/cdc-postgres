# PostgreSQL configuration for CDC instance on port 5433
# This file is mounted to /etc/postgresql/postgresql.conf inside the container

# -----------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100

# -----------------------------------------------------------------------------
# LOGGING — writes to pg_log/ inside the data directory (visible on host)
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# What to log
log_connections = on
log_disconnections = on
log_duration = off
log_line_prefix = '%m [%p] %q%u@%d '
log_statement = 'ddl'             # log CREATE / ALTER / DROP etc.
log_min_duration_statement = 1000  # log queries slower than 1s (ms)

# -----------------------------------------------------------------------------
# WAL / REPLICATION (relevant for CDC)
# -----------------------------------------------------------------------------
wal_level = logical               # required for logical replication / CDC
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 256MB

# -----------------------------------------------------------------------------
# RESOURCE USAGE
# -----------------------------------------------------------------------------
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB

# -----------------------------------------------------------------------------
# WRITE-AHEAD LOG
# -----------------------------------------------------------------------------
wal_buffers = 4MB
checkpoint_timeout = 5min
max_wal_size = 1GB
min_wal_size = 80MB

# -----------------------------------------------------------------------------
# LOCK MANAGEMENT
# -----------------------------------------------------------------------------
deadlock_timeout = 1s
